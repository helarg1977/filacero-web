<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FilaCero — Flyer QR</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Lato', sans-serif;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .controls {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .controls button {
      background: #8B5CF6;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      font-family: 'Lato', sans-serif;
      white-space: nowrap;
    }
    .controls button:hover { background: #7C3AED; }
    .controls span {
      font-size: 13px;
      color: #6B7280;
    }

    /* FLYER */
    .flyer {
      width: 420px;
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(139,92,246,0.2);
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%);
      padding: 28px 24px 20px;
      text-align: center;
      position: relative;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 0; right: 0;
      height: 40px;
      background: white;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }
    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.15);
      border-radius: 30px;
      padding: 6px 14px;
      margin-bottom: 14px;
    }
    .logo-text {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 18px;
      color: white;
      letter-spacing: 1px;
    }
    .logo-dot { color: #FCD34D; font-size: 22px; }
    .negocio-nombre {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 26px;
      color: white;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .negocio-categoria {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      font-weight: 400;
    }

    /* BODY */
    .body {
      padding: 36px 28px 24px;
      text-align: center;
    }
    .cta-text {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 22px;
      color: #1C1E21;
      margin-bottom: 4px;
    }
    .cta-sub {
      font-size: 14px;
      color: #6B7280;
      margin-bottom: 24px;
    }

    /* QR */
    .qr-container {
      background: white;
      border: 3px solid #8B5CF6;
      border-radius: 20px;
      padding: 16px;
      display: inline-block;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(139,92,246,0.15);
    }
    canvas { display: block; border-radius: 8px; }
    .qr-url {
      font-size: 11px;
      color: #8B5CF6;
      font-weight: 700;
      margin-bottom: 24px;
      word-break: break-all;
    }

    /* STEPS */
    .steps {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
      max-width: 90px;
    }
    .step-icon {
      width: 44px;
      height: 44px;
      background: #F5F3FF;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border: 2px solid #DDD6FE;
    }
    .step-label {
      font-size: 10px;
      color: #6B7280;
      text-align: center;
      font-weight: 700;
      line-height: 1.2;
    }
    .step-arrow {
      font-size: 16px;
      color: #DDD6FE;
      align-self: center;
      margin-top: -16px;
    }

    /* BADGES */
    .badges {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .badge {
      background: #F5F3FF;
      border: 1px solid #DDD6FE;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      color: #7C3AED;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* FOOTER */
    .footer {
      background: #1C1E21;
      padding: 14px 24px;
      text-align: center;
    }
    .footer-text {
      color: rgba(255,255,255,0.6);
      font-size: 11px;
    }
    .footer-brand {
      color: #8B5CF6;
      font-weight: 900;
      font-family: 'Montserrat', sans-serif;
    }

    @media print {
      body { background: white; padding: 0; }
      .controls { display: none; }
      .flyer {
        box-shadow: none;
        border-radius: 0;
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>

<div class="controls">
  <button onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
  <span>Imprime en tamaño carta o A4</span>
</div>

<div class="flyer" id="flyer">
  <div class="header">
    <div class="logo-badge">
      <span class="logo-dot">●</span>
      <span class="logo-text">FilaCero</span>
    </div>
    <div class="negocio-nombre" id="negocio-nombre">Cargando...</div>
    <div class="negocio-categoria" id="negocio-categoria"></div>
  </div>

  <div class="body">
    <div class="cta-text">¡Agenda sin llamar!</div>
    <div class="cta-sub">Escanea el código y reserva tu cita en segundos</div>

    <div class="qr-container">
      <canvas id="qr-canvas"></canvas>
    </div>
    <div class="qr-url" id="qr-url"></div>

    <div class="steps">
      <div class="step">
        <div class="step-icon">📱</div>
        <div class="step-label">Escanea el QR</div>
      </div>
      <div class="step-arrow">›</div>
      <div class="step">
        <div class="step-icon">✂️</div>
        <div class="step-label">Elige servicio</div>
      </div>
      <div class="step-arrow">›</div>
      <div class="step">
        <div class="step-icon">📅</div>
        <div class="step-label">Confirma tu cita</div>
      </div>
    </div>

    <div class="badges">
      <div class="badge">✅ Sin llamadas</div>
      <div class="badge">⚡ En segundos</div>
      <div class="badge">🏆 Acumula puntos</div>
      <div class="badge">🎁 Gana premios</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-text">
      Powered by <span class="footer-brand">FilaCero</span> · La app de tu barrio
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://djzloikdmahnqclmvhsf.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqemxvaWtkbWFobnFjbG12aHNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyOTYyNTUsImV4cCI6MjA5Mjg3MjI1NX0.OKiBQUqkBT_iGsW1avHqPyl8sA4blfDc3jrEWPvzJTw';

  const slug = window.location.pathname.replace('/qr/', '').replace('/qr', '');

  async function cargar() {
    if (!slug) {
      document.getElementById('negocio-nombre').textContent = 'Negocio no encontrado';
      return;
    }

    try {
      const resp = await fetch(
        `${SUPABASE_URL}/rest/v1/negocios?slug=eq.${slug}&select=nombre,categoria,id&limit=1`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }}
      );
      const data = await resp.json();

      if (!data || data.length === 0) {
        document.getElementById('negocio-nombre').textContent = 'Negocio no encontrado';
        return;
      }

      const negocio = data[0];
      document.getElementById('negocio-nombre').textContent = negocio.nombre;
      document.getElementById('negocio-categoria').textContent = negocio.categoria || '';
      document.title = `${negocio.nombre} — FilaCero`;

      const url = `https://filacero-web.vercel.app/${slug}`;
      document.getElementById('qr-url').textContent = url;

      QRCode.toCanvas(document.getElementById('qr-canvas'), url, {
        width: 200,
        margin: 1,
        color: { dark: '#1C1E21', light: '#FFFFFF' },
        errorCorrectionLevel: 'H'
      });

    } catch(e) {
      document.getElementById('negocio-nombre').textContent = 'Error al cargar';
    }
  }

  cargar();
</script>
</body>
</html>
